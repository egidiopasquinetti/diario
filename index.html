<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Diario">
<title>Diario</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text2: #6b6a64;
    --text3: #9e9d96;
    --rage: #c94a22;
    --rage-bg: #fdf0ec;
    --rage-border: #f0b9a8;
    --fatigue: #1e6fa8;
    --fatigue-bg: #eef5fc;
    --fatigue-border: #a8cce8;
    --ok: #1a7a50;
    --ok-bg: #edf7f2;
    --accent: #2a2a26;
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1e1e1a;
      --surface2: #2a2a26;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #e8e7e0;
      --text2: #9e9d96;
      --text3: #5a5952;
      --rage: #e8704a;
      --rage-bg: #2a1e19;
      --rage-border: #5a2e1e;
      --fatigue: #5aaae0;
      --fatigue-bg: #151e2a;
      --fatigue-border: #1e3a52;
      --ok: #4ab87a;
      --ok-bg: #0f2018;
      --accent: #e8e7e0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; color: var(--text); font-size: 16px; }
  body { display: flex; flex-direction: column; }

  nav { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border2); position: sticky; top: 0; z-index: 100; }
  nav button { flex: 1; padding: 14px 0; font-size: 13px; font-weight: 500; background: none; border: none; color: var(--text2); cursor: pointer; }
  nav button.active { color: var(--text); border-bottom: 2px solid var(--text); }

  .view { display: none; flex: 1; overflow-y: auto; padding: 20px 16px 50px; max-width: 600px; margin: 0 auto; width: 100%; }
  .view.active { display: block; }

  /* DATE STRIP */
  .date-strip { margin-bottom: 20px; }
  .date-strip .nav-row { display: flex; align-items: center; gap: 8px; }
  .date-strip .date-main { font-size: 22px; font-weight: 700; flex: 1; line-height: 1.1; }
  .date-strip .date-full { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .btn-icon { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--text2); flex-shrink: 0; }
  .btn-icon:disabled { opacity: .25; cursor: default; }
  .today-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; background: var(--surface2); border: 0.5px solid var(--border2); color: var(--text2); cursor: pointer; font-weight: 500; white-space: nowrap; }

  /* MOOD */
  .sec-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
  .mood-row { display: flex; gap: 8px; margin-bottom: 22px; }
  .mood-btn { flex: 1; padding: 10px 4px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); font-size: 12px; color: var(--text2); cursor: pointer; text-align: center; line-height: 1.4; font-weight: 500; }
  .mood-btn.sel-rage { border-color: var(--rage-border); background: var(--rage-bg); color: var(--rage); }
  .mood-btn.sel-ok { border-color: #8adabc; background: var(--ok-bg); color: var(--ok); }
  .mood-btn.sel-fatigue { border-color: var(--fatigue-border); background: var(--fatigue-bg); color: var(--fatigue); }

  /* LOG BLOCKS */
  .log-block { margin-bottom: 20px; }
  .log-block .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .log-block .log-header .sec-label { margin-bottom: 0; }
  .add-entry-btn { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid; cursor: pointer; background: transparent; }
  .log-block.rage-block .add-entry-btn { border-color: var(--rage-border); color: var(--rage); }
  .log-block.fatigue-block .add-entry-btn { border-color: var(--fatigue-border); color: var(--fatigue); }

  /* ENTRY ITEMS */
  .log-entries { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .log-entry-item { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
  .log-entry-item.rage { border-left: 3px solid var(--rage); }
  .log-entry-item.fatigue { border-left: 3px solid var(--fatigue); }
  .lei-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); }
  .lei-time { font-size: 12px; font-weight: 600; color: var(--text2); font-variant-numeric: tabular-nums; }
  .lei-time-edit { font-size: 12px; border: none; background: transparent; color: var(--text2); font-weight: 600; font-family: inherit; padding: 0; width: 48px; cursor: pointer; }
  .lei-time-edit:focus { outline: none; color: var(--text); }
  .lei-del { margin-left: auto; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
  .lei-del:hover { color: var(--rage); }
  .lei-text { display: block; width: 100%; padding: 10px 12px; font-family: inherit; font-size: 15px; line-height: 1.6; color: var(--text); background: var(--surface); border: none; resize: none; min-height: 72px; }
  .lei-text:focus { outline: none; }
  .lei-text.rage:focus { background: var(--rage-bg); }
  .lei-text.fatigue:focus { background: var(--fatigue-bg); }

  .empty-log { text-align: center; padding: 14px; font-size: 13px; color: var(--text3); border: 1px dashed var(--border2); border-radius: var(--radius-sm); }

  /* SAVE BTN */
  .save-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; color: var(--bg); cursor: pointer; margin-top: 4px; letter-spacing: .01em; }
  .save-btn:active { opacity: .85; }
  .save-btn:disabled { opacity: .4; }
  .status-bar { font-size: 13px; text-align: center; padding: 10px; margin-top: 10px; border-radius: var(--radius-sm); display: none; }
  .status-bar.ok { display: block; background: var(--ok-bg); color: var(--ok); }
  .status-bar.err { display: block; background: var(--rage-bg); color: var(--rage); }
  .status-bar.loading { display: block; background: var(--surface2); color: var(--text2); }

  /* SETUP */
  .setup-banner { background: #fff8e6; border: 1px solid #f5d87a; border-radius: var(--radius-sm); padding: 14px; margin-bottom: 20px; font-size: 13px; line-height: 1.6; color: #7a5800; }
  .setup-banner strong { display: block; font-size: 14px; margin-bottom: 4px; }
  .setup-banner a { color: #7a5800; }
  @media (prefers-color-scheme: dark) {
    .setup-banner { background: #2a2200; border-color: #5a4400; color: #e0c060; }
    .setup-banner a { color: #e0c060; }
  }
  .setup-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); margin-top: 8px; }
  .setup-save-btn { margin-top: 8px; padding: 8px 18px; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }

  /* STORICO */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-input { width: 100%; padding: 10px 14px 10px 38px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); }
  .search-input:focus { outline: 2px solid var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .history-entry { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
  .history-entry:hover { background: var(--surface2); }
  .he-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .he-date { font-size: 14px; font-weight: 600; }
  .he-mood { font-size: 12px; padding: 3px 8px; border-radius: 20px; }
  .he-mood.rage { background: var(--rage-bg); color: var(--rage); }
  .he-mood.ok { background: var(--ok-bg); color: var(--ok); }
  .he-mood.fatigue { background: var(--fatigue-bg); color: var(--fatigue); }
  .he-counts { display: flex; gap: 10px; margin-top: 6px; }
  .he-count { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .he-count .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .he-preview { font-size: 13px; color: var(--text2); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .load-more-btn { width: 100%; padding: 12px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; color: var(--text2); cursor: pointer; margin-top: 4px; }
  .empty-state { text-align: center; padding: 40px 0; color: var(--text3); font-size: 15px; }

  /* MODAL */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; }
  .modal-backdrop.open { display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 20px 44px; width: 100%; max-width: 600px; max-height: 88vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: var(--surface2); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; }
  .modal-sec-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin: 14px 0 8px; }
  .modal-sec-label.rage { color: var(--rage); }
  .modal-sec-label.fatigue { color: var(--fatigue); }
  .modal-log-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .modal-log-item:last-child { border-bottom: none; }
  .modal-log-time { font-size: 12px; font-weight: 600; color: var(--text3); white-space: nowrap; padding-top: 2px; font-variant-numeric: tabular-nums; }
  .modal-log-text { font-size: 14px; line-height: 1.6; color: var(--text); }
  .modal-edit { width: 100%; padding: 12px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .modal-del { width: 100%; padding: 12px; background: var(--rage-bg); border: 1px solid var(--rage-border); border-radius: var(--radius-sm); color: var(--rage); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

  /* DASHBOARD */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .kpi-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
  .kpi-card .kv { font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .kpi-card .kl { font-size: 12px; color: var(--text2); line-height: 1.3; }
  .kpi-card.rage .kv { color: var(--rage); }
  .kpi-card.fatigue .kv { color: var(--fatigue); }
  .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .chart-card .ct { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 14px; letter-spacing: .08em; text-transform: uppercase; }
  .chart-wrap { position: relative; height: 180px; }
  .dow-bars { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .dow-bar-group { display: flex; flex-direction: column; align-items: center; }
  .dow-bar-lbl { font-size: 11px; color: var(--text3); margin-top: 5px; font-weight: 500; }
  .dow-bar-wrap { width: 100%; display: flex; flex-direction: column; gap: 3px; height: 80px; justify-content: flex-end; align-items: center; }
  .dow-bar { width: 80%; border-radius: 3px 3px 0 0; min-height: 2px; }
  .dow-bar.rage { background: var(--rage); opacity: .8; }
  .dow-bar.fatigue { background: var(--fatigue); opacity: .8; }
  .legend-row { display: flex; gap: 14px; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* HOUR HEATMAP */
  .hour-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
  .hour-cell { aspect-ratio: 1; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text3); font-weight: 500; }
  .hour-cell-lbl { font-size: 9px; color: var(--text3); text-align: center; margin-top: 2px; }

  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { height: 0.5px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>

<nav>
  <button class="active" data-view="diario" onclick="switchView('diario',this)">Diario</button>
  <button data-view="storico" onclick="switchView('storico',this)">Storico</button>
  <button data-view="dashboard" onclick="switchView('dashboard',this)">Dashboard</button>
</nav>

<!-- ===== DIARIO ===== -->
<div id="view-diario" class="view active">

  <div id="setup-banner" class="setup-banner" style="display:none">
    <strong>⚙️ Configurazione necessaria</strong>
    Incolla l'URL del tuo Google Apps Script per connettere il diario al Google Sheet.
    <a href="#" onclick="showSetupHelp();return false;">Come si ottiene? →</a>
    <input id="api-url-input" class="setup-input" type="url" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="setup-save-btn" onclick="saveApiUrl()">Salva e connetti</button>
  </div>

  <div class="date-strip">
    <div class="nav-row">
      <button class="btn-icon" id="btn-prev" onclick="changeDay(-1)">‹</button>
      <div style="flex:1">
        <div class="date-main" id="date-label"></div>
        <div class="date-full" id="date-full"></div>
      </div>
      <button class="today-btn" onclick="goToday()">Oggi</button>
      <button class="btn-icon" id="btn-next" onclick="changeDay(1)">›</button>
    </div>
  </div>

  <div class="sec-label">Com'è andata</div>
  <div class="mood-row">
    <button class="mood-btn" id="mood-rage" onclick="selectMood('Incazzato')">😤<br>Incazzato</button>
    <button class="mood-btn" id="mood-ok" onclick="selectMood('Normale')">🙂<br>Normale</button>
    <button class="mood-btn" id="mood-fatigue" onclick="selectMood('Esausto')">😮‍💨<br>Esausto</button>
  </div>

  <!-- ARRABBIATURE LOG -->
  <div class="log-block rage-block">
    <div class="log-header">
      <div class="sec-label" style="color:var(--rage)">Arrabbiature</div>
      <button class="add-entry-btn" onclick="addLogEntry('rage')">+ Aggiungi</button>
    </div>
    <div class="log-entries" id="rage-entries"></div>
    <div class="empty-log" id="rage-empty">Nessuna arrabbiatura oggi. Bene.</div>
  </div>

  <!-- FATICHE LOG -->
  <div class="log-block fatigue-block">
    <div class="log-header">
      <div class="sec-label" style="color:var(--fatigue)">Fatiche</div>
      <button class="add-entry-btn" onclick="addLogEntry('fatigue')">+ Aggiungi</button>
    </div>
    <div class="log-entries" id="fatigue-entries"></div>
    <div class="empty-log" id="fatigue-empty">Nessuna fatica oggi. Ottimo.</div>
  </div>

  <button class="save-btn" id="save-btn" onclick="saveEntry()">Salva la giornata</button>
  <div class="status-bar" id="status-bar"></div>
</div>

<!-- ===== STORICO ===== -->
<div id="view-storico" class="view">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="search" placeholder="Cerca nelle voci…" oninput="filterHistory(this.value)" autocorrect="off" autocomplete="off">
  </div>
  <div id="history-list"></div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="view-dashboard" class="view">
  <div id="dashboard-content"></div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-date"></div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div id="modal-body"></div>
    <button class="modal-edit" onclick="editFromModal()">Modifica questa giornata</button>
    <button class="modal-del" onclick="deleteFromModal()">Elimina giornata</button>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_URL = 'diario_api_url';
const DOW_IT = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
const MONTHS_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

let currentDate = new Date();
let selectedMood = null;
// rageLog / fatigueLog: array di { id, time, text }
let rageLog = [];
let fatigueLog = [];
let allEntries = [];
let modalDate = null;
let charts = {};

// ============================================================
// API
// ============================================================
function getApiUrl() { return localStorage.getItem(STORAGE_URL) || ''; }

function saveApiUrl() {
  const url = document.getElementById('api-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) { alert('URL non valido.'); return; }
  localStorage.setItem(STORAGE_URL, url);
  document.getElementById('setup-banner').style.display = 'none';
  loadEntry();
}

function showSetupHelp() {
  alert('1. Apri il Google Sheet\n2. Extensions > Apps Script\n3. Incolla Code.gs\n4. Deploy > New deployment > Web app\n5. "Execute as: Me" — "Who has access: Anyone"\n6. Copia l\'URL e incollalo qui');
}

async function apiCall(params) {
  const url = getApiUrl();
  if (!url) throw new Error('API non configurato');
  const resp = await fetch(url + '?' + new URLSearchParams(params));
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'Errore API');
  return json.data;
}

async function apiPost(body) {
  const url = getApiUrl();
  if (!url) throw new Error('API non configurato');
  // Usiamo GET con payload per evitare CORS (Apps Script non supporta POST cross-origin)
  const payload = encodeURIComponent(JSON.stringify(body));
  const resp = await fetch(url + '?action=' + body.action + '&payload=' + payload);
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'Errore API');
  return json.data;
}

// ============================================================
// DATE HELPERS
// ============================================================
function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isToday(d) { return dateKey(d) === dateKey(new Date()); }
function nowTime() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
function formatDateMain(d) {
  if (isToday(d)) return 'Oggi';
  const _d1=dateKey(d).split('-'); const _d2=dateKey(new Date()).split('-'); const diff=Math.round((new Date(+_d1[0],+_d1[1]-1,+_d1[2])-new Date(+_d2[0],+_d2[1]-1,+_d2[2]))/86400000);
  if (diff === -1) return 'Ieri';
  return DOW_IT[d.getDay()].charAt(0).toUpperCase() + DOW_IT[d.getDay()].slice(1);
}
function formatDateFull(d) {
  return DOW_IT[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_IT[d.getMonth()] + ' ' + d.getFullYear();
}
function formatHistDate(str) {
  const p=str.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]);
  return d.getDate() + ' ' + MONTHS_IT[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
}
function formatHistDateFull(str) {
  const p=str.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]);
  return DOW_IT[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS_IT[d.getMonth()] + ' ' + d.getFullYear();
}

// ============================================================
// LOG ENTRY MANAGEMENT
// ============================================================
function makeId() { return Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function addLogEntry(type, time, text) {
  const id = makeId();
  const t = time || nowTime();
  const entry = { id, time: t, text: text || '' };
  if (type === 'rage') rageLog.push(entry);
  else fatigueLog.push(entry);
  renderLog(type);
  // Focus sul nuovo textarea
  setTimeout(() => {
    const el = document.getElementById('lei-text-' + id);
    if (el) el.focus();
  }, 50);
}

function removeLogEntry(type, id) {
  if (type === 'rage') rageLog = rageLog.filter(e => e.id !== id);
  else fatigueLog = fatigueLog.filter(e => e.id !== id);
  renderLog(type);
}

function renderLog(type) {
  const log = type === 'rage' ? rageLog : fatigueLog;
  const container = document.getElementById(type + '-entries');
  const empty = document.getElementById(type + '-empty');
  const colorClass = type;
  empty.style.display = log.length ? 'none' : 'block';
  container.innerHTML = log.map(e => `
    <div class="log-entry-item ${type}" id="lei-${e.id}">
      <div class="lei-header">
        <span style="font-size:11px;color:var(--text3);font-weight:500;margin-right:2px">🕐</span>
        <input class="lei-time-edit" type="time" value="${e.time}" onchange="updateLogTime('${type}','${e.id}',this.value)" title="Modifica orario">
        <button class="lei-del" onclick="removeLogEntry('${type}','${e.id}')" title="Elimina">×</button>
      </div>
      <textarea class="lei-text ${colorClass}" id="lei-text-${e.id}" rows="3"
        placeholder="${type === 'rage' ? 'Cosa è successo…' : 'Cosa ti ha pesato…'}"
        oninput="updateLogText('${type}','${e.id}',this.value)">${e.text}</textarea>
    </div>
  `).join('');
}

function updateLogTime(type, id, val) {
  const log = type === 'rage' ? rageLog : fatigueLog;
  const entry = log.find(e => e.id === id);
  if (entry) entry.time = val;
}

function updateLogText(type, id, val) {
  const log = type === 'rage' ? rageLog : fatigueLog;
  const entry = log.find(e => e.id === id);
  if (entry) entry.text = val;
}

// ============================================================
// DIARIO VIEW
// ============================================================
function renderDateStrip() {
  document.getElementById('date-label').textContent = formatDateMain(currentDate);
  document.getElementById('date-full').textContent = formatDateFull(currentDate);
  document.getElementById('btn-next').disabled = isToday(currentDate);
}

function changeDay(delta) {
  if (delta > 0 && isToday(currentDate)) return;
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  renderDateStrip();
  loadEntry();
}

function goToday() {
  currentDate = new Date();
  renderDateStrip();
  loadEntry();
}

async function loadEntry() {
  clearForm();
  if (!getApiUrl()) return;
  showStatus('Caricamento…', 'loading');
  try {
    const entry = await apiCall({ action: 'get', date: dateKey(currentDate) });
    if (entry) populateForm(entry);
    showStatus('', '');
  } catch(e) {
    showStatus('Errore: ' + e.message, 'err');
  }
}

function clearForm() {
  selectedMood = null;
  rageLog = [];
  fatigueLog = [];
  updateMoodUI();
  renderLog('rage');
  renderLog('fatigue');
}

function populateForm(entry) {
  selectedMood = entry.mood || null;
  updateMoodUI();
  // Parse JSON logs
  try { rageLog = JSON.parse(entry.arrabbiatura || '[]'); } catch(e) {
    // Legacy: plain text — converti in singola entry
    if (entry.arrabbiatura) rageLog = [{ id: makeId(), time: '—', text: entry.arrabbiatura }];
    else rageLog = [];
  }
  try { fatigueLog = JSON.parse(entry.fatica || '[]'); } catch(e) {
    if (entry.fatica) fatigueLog = [{ id: makeId(), time: '—', text: entry.fatica }];
    else fatigueLog = [];
  }
  renderLog('rage');
  renderLog('fatigue');
}

function selectMood(m) {
  selectedMood = selectedMood === m ? null : m;
  updateMoodUI();
}

function updateMoodUI() {
  document.getElementById('mood-rage').className = 'mood-btn' + (selectedMood === 'Incazzato' ? ' sel-rage' : '');
  document.getElementById('mood-ok').className = 'mood-btn' + (selectedMood === 'Normale' ? ' sel-ok' : '');
  document.getElementById('mood-fatigue').className = 'mood-btn' + (selectedMood === 'Esausto' ? ' sel-fatigue' : '');
}

async function saveEntry() {
  // Leggi valori aggiornati dai textarea prima di salvare
  rageLog.forEach(e => {
    const el = document.getElementById('lei-text-' + e.id);
    if (el) e.text = el.value;
  });
  fatigueLog.forEach(e => {
    const el = document.getElementById('lei-text-' + e.id);
    if (el) e.text = el.value;
  });

  const rageClean = rageLog.filter(e => e.text.trim());
  const fatigueClean = fatigueLog.filter(e => e.text.trim());

  if (!rageClean.length && !fatigueClean.length && !selectedMood) {
    showStatus('Nessun dato da salvare.', 'err');
    return;
  }

  document.getElementById('save-btn').disabled = true;
  showStatus('Salvataggio…', 'loading');
  try {
    await apiPost({
      action: 'save',
      data: dateKey(currentDate),
      mood: selectedMood,
      arrabbiatura: JSON.stringify(rageClean),
      fatica: JSON.stringify(fatigueClean)
    });
    showStatus('Salvato ✓', 'ok');
    allEntries = [];
    setTimeout(() => showStatus('', ''), 2500);
  } catch(e) {
    showStatus('Errore: ' + e.message, 'err');
  }
  document.getElementById('save-btn').disabled = false;
}

function showStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

// ============================================================
// STORICO
// ============================================================
const HISTORY_PAGE = 30;

async function loadHistory(force) {
  const list = document.getElementById('history-list');
  if (!allEntries.length || force) {
    list.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
    try { allEntries = await apiCall({ action: 'list' }); }
    catch(e) { list.innerHTML = '<div class="empty-state">Errore: ' + e.message + '</div>'; return; }
  }
  renderHistory(allEntries);
}

function filterHistory(q) {
  const lq = q.trim().toLowerCase();
  const filtered = lq ? allEntries.filter(e => {
    const rageText = tryParseLog(e.arrabbiatura).map(x => x.text).join(' ').toLowerCase();
    const fatigueText = tryParseLog(e.fatica).map(x => x.text).join(' ').toLowerCase();
    return rageText.includes(lq) || fatigueText.includes(lq) || (e.mood||'').toLowerCase().includes(lq);
  }) : allEntries;
  renderHistory(filtered);
}

function tryParseLog(str) {
  try { return JSON.parse(str || '[]'); } catch(e) { return str ? [{ time: '', text: str }] : []; }
}

function renderHistory(entries) {
  const list = document.getElementById('history-list');
  if (!entries.length) { list.innerHTML = '<div class="empty-state">Nessuna voce trovata.</div>'; return; }
  const shown = entries.slice(0, HISTORY_PAGE);
  const rest = entries.length - shown.length;
  list.innerHTML = shown.map(e => renderEntryCard(e)).join('') +
    (rest > 0 ? `<button class="load-more-btn" onclick="loadMore()">Carica altri ${rest}…</button>` : '');
  list.dataset.all = JSON.stringify(entries);
}

function loadMore() {
  const entries = JSON.parse(document.getElementById('history-list').dataset.all || '[]');
  const current = document.querySelectorAll('.history-entry').length;
  const more = entries.slice(0, current + HISTORY_PAGE);
  const rest = entries.length - more.length;
  document.getElementById('history-list').innerHTML = more.map(e => renderEntryCard(e)).join('') +
    (rest > 0 ? `<button class="load-more-btn" onclick="loadMore()">Carica altri ${rest}…</button>` : '');
  document.getElementById('history-list').dataset.all = JSON.stringify(entries);
}

function renderEntryCard(e) {
  const moodClass = e.mood === 'Incazzato' ? 'rage' : e.mood === 'Esausto' ? 'fatigue' : 'ok';
  const rageItems = tryParseLog(e.arrabbiatura);
  const fatigueItems = tryParseLog(e.fatica);
  const preview = (rageItems[0]?.text || fatigueItems[0]?.text || '—').slice(0, 80);
  return `<div class="history-entry" onclick="openModal('${e.data}')">
    <div class="he-header">
      <div class="he-date">${formatHistDateFull(e.data)}</div>
      ${e.mood ? `<span class="he-mood ${moodClass}">${e.mood}</span>` : ''}
    </div>
    <div class="he-preview">${preview}</div>
    <div class="he-counts">
      ${rageItems.length ? `<span class="he-count"><span class="dot" style="background:var(--rage)"></span>${rageItems.length} arrabbiatura${rageItems.length > 1 ? 'e' : ''}</span>` : ''}
      ${fatigueItems.length ? `<span class="he-count"><span class="dot" style="background:var(--fatigue)"></span>${fatigueItems.length} fatica${fatigueItems.length > 1 ? 'e' : ''}</span>` : ''}
    </div>
  </div>`;
}

// ============================================================
// MODAL
// ============================================================
function openModal(dateStr) {
  modalDate = dateStr;
  const entry = allEntries.find(e => e.data === dateStr);
  if (!entry) return;
  document.getElementById('modal-date').textContent = formatHistDateFull(dateStr);
  const moodClass = entry.mood === 'Incazzato' ? 'rage' : entry.mood === 'Esausto' ? 'fatigue' : 'ok';
  const rageItems = tryParseLog(entry.arrabbiatura);
  const fatigueItems = tryParseLog(entry.fatica);
  let html = entry.mood ? `<div style="margin-bottom:12px"><span class="he-mood ${moodClass}">${entry.mood}</span></div>` : '';
  if (rageItems.length) {
    html += `<div class="modal-sec-label rage">Arrabbiature (${rageItems.length})</div>`;
    html += rageItems.map(i => `<div class="modal-log-item"><div class="modal-log-time">${i.time}</div><div class="modal-log-text">${i.text}</div></div>`).join('');
  }
  if (fatigueItems.length) {
    html += `<div class="modal-sec-label fatigue">Fatiche (${fatigueItems.length})</div>`;
    html += fatigueItems.map(i => `<div class="modal-log-item"><div class="modal-log-time">${i.time}</div><div class="modal-log-text">${i.text}</div></div>`).join('');
  }
  if (!html) html = '<div style="color:var(--text3);font-size:14px">Voce vuota.</div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal-backdrop')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-backdrop').classList.remove('open'); }

async function deleteFromModal() {
  if (!modalDate || !confirm('Eliminare la voce del ' + formatHistDate(modalDate) + '?')) return;
  try {
    await apiCall({ action: 'delete', date: modalDate });
    allEntries = allEntries.filter(e => e.data !== modalDate);
    renderHistory(allEntries);
    closeModalDirect();
  } catch(e) { alert('Errore: ' + e.message); }
}

function editFromModal() {
  if (!modalDate) return;
  const mp=modalDate.split('-'); currentDate=new Date(+mp[0],+mp[1]-1,+mp[2]);
  renderDateStrip();
  const entry = allEntries.find(e => e.data === modalDate);
  clearForm();
  if (entry) populateForm(entry);
  closeModalDirect();
  switchView('diario', document.querySelector('nav button[data-view="diario"]'));
}

// ============================================================
// DASHBOARD
// ============================================================
async function loadDashboard() {
  const el = document.getElementById('dashboard-content');
  el.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
  try {
    const s = await apiCall({ action: 'stats' });
    renderDashboard(s);
  } catch(e) {
    el.innerHTML = '<div class="empty-state">Errore: ' + e.message + '</div>';
  }
}

function renderDashboard(s) {
  const el = document.getElementById('dashboard-content');
  if (!s.total) { el.innerHTML = '<div class="empty-state">Ancora pochi dati. Torna dopo qualche settimana.</div>'; return; }
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#9e9d96' : '#6b6a64';

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card rage"><div class="kv">${s.rageRate30}%</div><div class="kl">Giorni con arrabbiatura (30gg)</div></div>
      <div class="kpi-card fatigue"><div class="kv">${s.fatigueRate30}%</div><div class="kl">Giorni con fatica (30gg)</div></div>
      <div class="kpi-card"><div class="kv">${s.total}</div><div class="kl">Voci totali</div></div>
      <div class="kpi-card"><div class="kv">${s.last30count}</div><div class="kl">Voci ultimi 30 giorni</div></div>
    </div>
    <div class="chart-card">
      <div class="ct">Trend settimanale — ultimi 90 giorni</div>
      <div class="chart-wrap"><canvas id="chart-weekly"></canvas></div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:var(--rage)"></div>Arrabbiatura</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--fatigue)"></div>Fatica</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="ct">Pattern per giorno della settimana</div>
      <div class="dow-bars" id="dow-bars"></div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:var(--rage)"></div>Arrabbiatura</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--fatigue)"></div>Fatica</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="ct">Orari più critici (quando si verificano gli eventi)</div>
      <div id="hour-heatmap"></div>
    </div>
    <div class="chart-card">
      <div class="ct">Distribuzione umore</div>
      <div class="chart-wrap" style="height:160px"><canvas id="chart-mood"></canvas></div>
    </div>
  `;

  // Weekly chart
  if (s.weeklySeries && s.weeklySeries.length) {
    const labels = s.weeklySeries.map(w => { const p=w.week.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]); return d.getDate()+'/'+(d.getMonth()+1); });
    if (charts.weekly) charts.weekly.destroy();
    charts.weekly = new Chart(document.getElementById('chart-weekly'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Arrabbiatura', data: s.weeklySeries.map(w => w.total ? Math.round(w.rage/w.total*100) : 0), borderColor: '#c94a22', backgroundColor: 'rgba(201,74,34,.1)', tension: .35, fill: true, pointRadius: 3, borderWidth: 2 },
        { label: 'Fatica', data: s.weeklySeries.map(w => w.total ? Math.round(w.fatigue/w.total*100) : 0), borderColor: '#1e6fa8', backgroundColor: 'rgba(30,111,168,.08)', tension: .35, fill: true, pointRadius: 3, borderWidth: 2 }
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw + '%' } } },
        scales: { y: { min: 0, max: 100, ticks: { color: textColor, font: { size: 11 }, callback: v => v+'%', stepSize: 25 }, grid: { color: gridColor } }, x: { ticks: { color: textColor, font: { size: 11 } }, grid: { display: false } } } }
    });
  }

  // DOW bars
  if (s.dowStats) {
    const maxPct = Math.max(...s.dowStats.flatMap(d => [d.rage, d.fatigue]), 1);
    document.getElementById('dow-bars').innerHTML = s.dowStats.map(d => `
      <div class="dow-bar-group">
        <div class="dow-bar-wrap">
          <div class="dow-bar rage" style="height:${Math.round(d.rage/maxPct*60)+2}px" title="Arrabbiatura ${d.rage}%"></div>
          <div class="dow-bar fatigue" style="height:${Math.round(d.fatigue/maxPct*60)+2}px" title="Fatica ${d.fatigue}%"></div>
        </div>
        <div class="dow-bar-lbl">${d.label}</div>
      </div>
    `).join('');
  }

  // Hour heatmap
  if (s.hourStats) {
    const maxH = Math.max(...s.hourStats, 1);
    const rageH = '#c94a22'; const fatigueH = '#1e6fa8';
    document.getElementById('hour-heatmap').innerHTML = `
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Dalle 06:00 alle 23:00 — intensità = frequenza eventi</div>
      <div class="hour-grid">
        ${s.hourStats.map((v, h) => {
          if (h < 6) return '';
          const alpha = v ? 0.15 + (v / maxH) * 0.75 : 0.06;
          const bg = v ? `rgba(201,74,34,${alpha.toFixed(2)})` : 'var(--surface2)';
          return `<div class="hour-cell" style="background:${bg};border:0.5px solid var(--border)" title="${h}:00 — ${v} eventi">${h}</div>`;
        }).join('')}
      </div>
    `;
  }

  // Mood donut
  if (s.moodCount && Object.keys(s.moodCount).length) {
    const labels = Object.keys(s.moodCount);
    const data = labels.map(k => s.moodCount[k]);
    const colors = labels.map(k => k === 'Incazzato' ? '#c94a22' : k === 'Esausto' ? '#1e6fa8' : '#1a7a50');
    if (charts.mood) charts.mood.destroy();
    charts.mood = new Chart(document.getElementById('chart-mood'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { position: 'right', labels: { color: textColor, font: { size: 12 }, boxWidth: 10, padding: 14 } } } }
    });
  }
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'storico') loadHistory();
  if (name === 'dashboard') loadDashboard();
}

// ============================================================
// INIT
// ============================================================
function init() {
  renderDateStrip();
  if (!getApiUrl()) {
    document.getElementById('setup-banner').style.display = 'block';
  } else {
    loadEntry();
  }
}
init();
</script>
</body>
</html>
